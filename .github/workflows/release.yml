name: Release

# Builds InstaEpi Monitor for Windows (.exe, onedir) and Linux (.AppImage) and
# attaches both to a GitHub Release.
#
# Normal use: push a tag like "v1.2.0" and both builds run + publish automatically.
#
# Manual use (workflow_dispatch): also lets you target an *existing* tag via the
# "tag" input, e.g. to backfill an AppImage onto a release that only ever got a
# manually-built .exe. When run manually without a matching tag, artifacts are
# built and uploaded as workflow artifacts only (no release is created/touched).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build for and attach artifacts to (leave empty to just build)"
        required: false
        type: string

env:
  TARGET_REF: ${{ inputs.tag || github.ref_name }}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller InstaEpiMonitor.spec --noconfirm --distpath dist --workpath build_tmp

      - name: Smoke test (offscreen launch)
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          $p = Start-Process -FilePath "dist\InstaEpiMonitor\InstaEpiMonitor.exe" -PassThru
          Start-Sleep -Seconds 6
          if ($p.HasExited) { Write-Error "InstaEpiMonitor.exe exited early (code $($p.ExitCode))"; exit 1 }
          Stop-Process -Id $p.Id -Force

      - name: Zip build
        shell: pwsh
        run: Compress-Archive -Path "dist\InstaEpiMonitor\*" -DestinationPath "InstaEpiMonitor-${{ env.TARGET_REF }}-win64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: InstaEpiMonitor-${{ env.TARGET_REF }}-win64.zip
          if-no-files-found: error

  build-linux-appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}

      # Packaging assets (icon, .desktop, AppRun) come from the workflow's own
      # ref, NOT from TARGET_REF -- older tags predate packaging/linux/ and
      # would otherwise fail to assemble the AppDir when backfilling.
      - uses: actions/checkout@v4
        with:
          path: ci-assets

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system Qt runtime libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller InstaEpiMonitor.spec --noconfirm --distpath dist --workpath build_tmp

      - name: Smoke test (offscreen launch)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          ./dist/InstaEpiMonitor/InstaEpiMonitor &
          pid=$!
          sleep 6
          if ! kill -0 "$pid" 2>/dev/null; then echo "InstaEpiMonitor exited early"; exit 1; fi
          kill "$pid"

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp -r dist/InstaEpiMonitor/. AppDir/usr/bin/
          cp ci-assets/packaging/linux/instaepimonitor.png AppDir/instaepimonitor.png
          cp ci-assets/packaging/linux/instaepimonitor.png AppDir/.DirIcon
          cp ci-assets/packaging/linux/instaepimonitor.desktop AppDir/instaepimonitor.desktop
          cp ci-assets/packaging/linux/AppRun AppDir/AppRun
          chmod +x AppDir/AppRun

      - name: Download appimagetool
        run: |
          curl -L -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Build AppImage
        run: ./appimagetool --appimage-extract-and-run AppDir "InstaEpiMonitor-${{ env.TARGET_REF }}-x86_64.AppImage"

      - name: Smoke test AppImage
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          ./InstaEpiMonitor-${{ env.TARGET_REF }}-x86_64.AppImage --appimage-extract-and-run &
          pid=$!
          sleep 6
          if ! kill -0 "$pid" 2>/dev/null; then echo "AppImage exited early"; exit 1; fi
          kill "$pid"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: InstaEpiMonitor-${{ env.TARGET_REF }}-x86_64.AppImage
          if-no-files-found: error

  release:
    needs: [build-windows, build-linux-appimage]
    # job-level `if` can't see the top-level `env` context, so recompute inline.
    if: startsWith(inputs.tag || github.ref_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ env.TARGET_REF }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "InstaEpi Monitor $TAG" --generate-notes
          fi
          gh release upload "$TAG" \
            artifacts/windows-exe/*.zip \
            artifacts/linux-appimage/*.AppImage \
            --clobber
